name: yysls_app
description: "燕云十六声装备毕业率管理器"
publish_to: 'none'
version: 1.1.0+2

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.6.1
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  go_router: ^14.8.1
  uuid: ^4.5.1
  collection: ^1.19.1
  google_mlkit_text_recognition: ^0.14.0
  image_picker: ^1.1.2
  image_cropper: ^8.0.2
  path_provider: ^2.1.5
  flutter_launcher_icons: ^0.14.3
  image: ^4.8.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/icon1.jpg"
  min_sdk_android: 21

flutter:
  uses-material-design: true
  assets:
    - assets/icon/
    - assets/images/
